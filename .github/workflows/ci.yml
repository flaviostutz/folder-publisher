name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: make build
      - run: make lint
      - run:  make test

  ci-windows-lib:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: |
          pnpm install --frozen-lockfile --config.dedupe-peer-dependents=false
          node -e "require('node:fs').rmSync('dist', { recursive: true, force: true })"
          pnpm exec tsc --outDir dist
          pnpm pack --pack-destination dist
        working-directory: lib
      - run: |
          pnpm install --frozen-lockfile
          node -e "require('node:fs').rmSync('dist', { recursive: true, force: true })"
          pnpm pack --pack-destination dist
        working-directory: examples/mypackage
      - run: |
          Copy-Item -Force package.json.orig package.json
          pnpm add filedist@file:../../lib/dist/filedist-0.0.1.tgz
          pnpm add example-files-package@file:../mypackage/dist/example-files-package-1.0.0.tgz
          pnpm install --no-frozen-lockfile
          pnpm exec filedist extract
          pnpm exec filedist check
          node ../../.github/scripts/check-cli-config-symlinks.cjs
        working-directory: examples/cli-config
